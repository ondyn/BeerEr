<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 500" width="1024" height="500">
  <defs>
    <!-- Beer amber gradient matching the logo -->
    <linearGradient id="beerGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFD100" />
      <stop offset="100%" stop-color="#FF9900" />
    </linearGradient>

    <!-- Subtle radial glow behind the mug -->
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#F5A623" stop-opacity="0.15" />
      <stop offset="100%" stop-color="#1A1208" stop-opacity="0" />
    </radialGradient>

    <!-- Bubble circles -->
    <radialGradient id="bubbleGrad" cx="40%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.25" />
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0.05" />
    </radialGradient>
  </defs>

  <!-- Background: dark beer colour -->
  <rect width="1024" height="500" fill="#1A1208" />

  <!-- Subtle surface accent strip at bottom -->
  <rect y="460" width="1024" height="40" fill="#2C1F0E" />

  <!-- Ambient glow behind the mug -->
  <ellipse cx="340" cy="260" rx="250" ry="230" fill="url(#glow)" />

  <!-- === BEER MUG (scaled-up logo, centred left) === -->
  <g transform="translate(220, 80) scale(1.8)">
    <!-- Handle -->
    <path fill="none" stroke="#EDF2F4" stroke-width="12" stroke-linejoin="miter"
          d="M 130,100 L 155,100 L 155,145 L 122,145"/>

    <!-- Beer liquid base -->
    <polygon fill="url(#beerGrad)" points="65,95 135,95 120,165 80,165"/>

    <!-- Angular foam -->
    <polygon fill="#EDF2F4" points="55,95 72,60 92,82 108,50 125,75 145,95 135,105 65,105"/>

    <!-- Glass highlight -->
    <polygon fill="#FFFFFF" opacity="0.2" points="75,95 85,95 78,160 70,160" />
  </g>

  <!-- Decorative bubbles -->
  <circle cx="290" cy="340" r="6" fill="url(#bubbleGrad)" opacity="0.5" />
  <circle cx="320" cy="380" r="4" fill="url(#bubbleGrad)" opacity="0.4" />
  <circle cx="370" cy="360" r="5" fill="url(#bubbleGrad)" opacity="0.45" />
  <circle cx="400" cy="395" r="3.5" fill="url(#bubbleGrad)" opacity="0.35" />
  <circle cx="345" cy="410" r="3" fill="url(#bubbleGrad)" opacity="0.3" />

  <!-- === TEXT AREA (right side) === -->

  <!-- App name: "Beerer" -->
  <text x="560" y="210"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif"
        font-size="86" font-weight="800" fill="#F5A623" letter-spacing="-1">
    Beerer
  </text>

  <!-- Tagline -->
  <text x="562" y="265"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif"
        font-size="26" font-weight="400" fill="#F5ECD7" letter-spacing="0.5">
    Track keg beer at parties
  </text>

  <!-- Feature bullets -->
  <text x="562" y="325"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif"
        font-size="19" fill="#A89880">
    🍺 Pour · 📊 Stats · 💰 Split costs
  </text>

  <!-- "Drink Responsibly" small text -->
  <text x="562" y="365"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif"
        font-size="13" fill="#A89880" opacity="0.6">
    Drink Responsibly
  </text>

  <!-- Subtle amber accent line under the tagline -->
  <rect x="562" y="278" width="60" height="3" rx="1.5" fill="#F5A623" opacity="0.6" />
</svg>

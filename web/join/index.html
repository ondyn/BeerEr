<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Join Beerer Session</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #0f0f10;
      --panel: #1b1b1d;
      --text: #f6f6f6;
      --muted: #b9b9b9;
      --accent: #f4a300;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at 20% 10%, #2a220f 0%, var(--bg) 45%);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      padding: 24px;
    }

    .card {
      width: min(560px, 100%);
      background: color-mix(in srgb, var(--panel) 90%, black 10%);
      border: 1px solid #313135;
      border-radius: 16px;
      padding: 24px;
      box-shadow: 0 16px 40px rgba(0, 0, 0, 0.4);
    }

    h1 {
      margin: 0 0 8px;
      font-size: 1.5rem;
      line-height: 1.2;
    }

    p {
      margin: 0 0 12px;
      color: var(--muted);
      line-height: 1.5;
    }

    .row {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      margin-top: 16px;
    }

    .button {
      flex: 1;
      min-width: 180px;
      display: inline-block;
      text-decoration: none;
      text-align: center;
      border-radius: 10px;
      padding: 12px 16px;
      font-weight: 600;
      color: var(--text);
      border: 1px solid #3b3b40;
      background: #26262a;
    }

    .button.primary {
      color: #1e1400;
      border-color: #d18e00;
      background: linear-gradient(180deg, #ffbc34 0%, var(--accent) 100%);
    }

    .small {
      font-size: 0.9rem;
      color: var(--muted);
      margin-top: 14px;
    }

    code {
      background: #111214;
      border: 1px solid #303236;
      border-radius: 6px;
      padding: 2px 6px;
      color: #ffd27e;
    }
  </style>
</head>
<body>
  <main class="card">
    <h1>Opening Beerer...</h1>
    <p>If Beerer is installed, this invite opens automatically.</p>
    <p id="session"></p>

    <div class="row">
      <a id="openApp" class="button primary" href="#">Open in Beerer</a>
      <a id="openStore" class="button" href="#">Install from Google Play</a>
    </div>

    <p class="small">If nothing happens, tap "Open in Beerer". If the app is not installed, use Google Play.</p>
  </main>

  <script>
    (function () {
      var packageId = 'com.beerer.beerer';
      var playStoreUrl = 'https://play.google.com/store/apps/details?id=' + packageId;

      var pathSegments = window.location.pathname.split('/').filter(Boolean);
      var sessionId = pathSegments.length >= 2 && pathSegments[0] === 'join'
        ? decodeURIComponent(pathSegments[1])
        : null;

      var sessionText = document.getElementById('session');
      var openApp = document.getElementById('openApp');
      var openStore = document.getElementById('openStore');

      if (!sessionId) {
        sessionText.textContent = 'Invalid invite link.';
        openApp.style.display = 'none';
        openStore.href = playStoreUrl;
        return;
      }

      var appUrl = 'beerer://join/' + encodeURIComponent(sessionId);
      sessionText.innerHTML = 'Session ID: <code>' + sessionId + '</code>';
      openApp.href = appUrl;
      openStore.href = playStoreUrl;

      var redirectTimer = window.setTimeout(function () {
        window.location.replace(playStoreUrl);
      }, 1800);

      document.addEventListener('visibilitychange', function () {
        if (document.hidden) {
          window.clearTimeout(redirectTimer);
        }
      });

      // Try to open app immediately.
      window.location.href = appUrl;
    })();
  </script>
</body>
</html>
